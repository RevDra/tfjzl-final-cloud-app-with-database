<div class="container mt-5">
    <h3>Exam</h3>
    <form action="{% url 'pages:submit' course.id %}" method="post">
        {% csrf_token %}
        
        {% for question in course.question_set.all %}
            <div class="card mt-4">
                <div class="card-header">
                    <h5>{{ question.content }}</h5>
                </div>
                <div class="card-body">
                    {% for choice in question.choice_set.all %}
                        <div class="form-check">
                            <input type="radio" name="choice_{{ question.id }}" id="choice_{{ choice.id }}" class="form-check-input" value="{{ choice.id }}">
                            <label for="choice_{{ choice.id }}" class="form-check-label">{{ choice.content }}</label>
                        </div>
                    {% endfor %}
                </div>
            </div>
        {% endfor %}
        <br>
        <button type="submit" class="btn btn-success btn-block">Submit Exam</button>
    </form>
</div>
